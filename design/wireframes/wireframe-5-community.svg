<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 940" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="940" fill="#ffffff"/>
  <text x="40" y="34" font-size="18" font-weight="700" fill="#333">Wireframe — Community  <tspan font-size="12" font-weight="400" fill="#999">· built for an iceberg</tspan></text>
  <rect x="40" y="48" width="920" height="870" fill="#ffffff" stroke="#cccccc"/>
  <rect x="40" y="48" width="920" height="56" fill="#F2F2F2" stroke="#cccccc"/><rect x="64" y="68" width="90" height="20" rx="3" fill="#ddd"/><text x="109" y="82" font-size="11" text-anchor="middle" fill="#666">logo</text><text x="360" y="82" font-size="12" fill="#666">Engine</text><text x="440" y="82" font-size="12" fill="#666">Explorations</text><text x="545" y="82" font-size="12" fill="#666">Thesis</text><text x="615" y="82" font-size="12" font-weight="700" fill="#333">Community</text><rect x="800" y="64" width="60" height="26" rx="4" fill="#ddd"/><text x="830" y="81" font-size="11" text-anchor="middle" fill="#666">Contact</text><rect x="872" y="64" width="74" height="26" rx="4" fill="#444"/><text x="909" y="81" font-size="11" text-anchor="middle" fill="#fff">Platform</text>
  <!-- header -->
  <rect x="40" y="104" width="920" height="90" fill="#FAFAFA" stroke="#cccccc"/><rect x="80" y="134" width="240" height="26" rx="3" fill="#e2e2e2"/><text x="92" y="153" font-size="14" font-weight="700" fill="#555">Community</text><text x="80" y="180" font-size="10" font-style="italic" fill="#5B7FA6">most users pull &amp; build (iceberg) — surface support + telemetry, not a PR bazaar</text>
  <!-- cards 2x2 + roadmap -->
  <g>
    <rect x="40" y="210" width="450" height="150" fill="#F2F2F2" stroke="#ccc"/><text x="60" y="236" font-size="12" font-weight="700" fill="#555">Contribute · DCO</text><rect x="60" y="252" width="380" height="10" fill="#ececec"/><rect x="60" y="272" width="340" height="10" fill="#ececec"/><rect x="60" y="312" width="150" height="30" rx="4" fill="#fff" stroke="#888"/><text x="135" y="332" font-size="10" text-anchor="middle" fill="#666">Contribution guide</text>
    <rect x="510" y="210" width="450" height="150" fill="#F2F2F2" stroke="#ccc"/><text x="530" y="236" font-size="12" font-weight="700" fill="#555">Showcase · register your graph</text><rect x="530" y="252" width="380" height="10" fill="#ececec"/><rect x="530" y="272" width="300" height="10" fill="#ececec"/><text x="530" y="316" font-size="10" font-style="italic" fill="#5B7FA6">registration = adoption telemetry</text>
