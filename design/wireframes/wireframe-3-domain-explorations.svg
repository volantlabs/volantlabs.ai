    <rect x="40" y="516" width="296" height="190" fill="#F2F2F2" stroke="#ccc"/><rect x="56" y="532" width="264" height="96" fill="#E6E6E6"/><text x="188" y="584" font-size="10" text-anchor="middle" fill="#999">img</text><rect x="56" y="638" width="60" height="14" rx="7" fill="#ddd"/><rect x="56" y="660" width="200" height="12" fill="#e0e0e0"/>
    <rect x="352" y="516" width="296" height="190" fill="#F2F2F2" stroke="#ccc"/><rect x="368" y="532" width="264" height="96" fill="#E6E6E6"/><text x="500" y="584" font-size="10" text-anchor="middle" fill="#999">img</text><rect x="368" y="638" width="60" height="14" rx="7" fill="#ddd"/><rect x="368" y="660" width="200" height="12" fill="#e0e0e0"/>
    <rect x="664" y="516" width="296" height="190" fill="#F2F2F2" stroke="#ccc"/><rect x="680" y="532" width="264" height="96" fill="#E6E6E6"/><text x="812" y="584" font-size="10" text-anchor="middle" fill="#999">img</text><rect x="680" y="638" width="60" height="14" rx="7" fill="#ddd"/><rect x="680" y="660" width="200" height="12" fill="#e0e0e0"/>
