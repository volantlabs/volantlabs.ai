<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="1000" fill="#ffffff"/>
